name: zenvyro_invoice
description: A Flutter Invoice Generator App for Zenvyro Labs internship.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.12.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.2

  # Database & File System
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # PDF & Sharing
  pdf: ^3.11.1
  printing: ^5.13.0
  share_plus: ^10.0.0

  # Utilities
  image_picker: ^1.2.3
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Ready for your logo assets later
  # assets:
  #   - assets/images/